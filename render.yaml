services:
  - type: web
    name: dental-backend
    runtime: python
    rootDir: dental_backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn dental_backend.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: DB_ENGINE
        value: "django.db.backends.postgresql"
      - key: DB_NAME
        value: "postgres"
      - key: DB_USER
        value: "postgres.cqhmhzsazrkcvjaxdihq"
      - key: DB_PASSWORD
        value: "YOUR_SUPABASE_PASSWORD"
      - key: DB_HOST
        value: "aws-1-ap-northeast-1.pooler.supabase.com"
      - key: DB_PORT
        value: "5432"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend.vercel.app"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://your-frontend.vercel.app"
